<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バイクばらし 要件×要素 マッピングツール</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── ヘッダー ── -->
<div class="header">
  <span class="logo">BARASHI</span>
  <span class="sep">|</span>
  <span class="htitle">バイク 要件×要素 マッピングツール</span>
  <div class="actions">
    <button class="btn" id="flipBtn" onclick="flipLayout()" style="font-size:11px">⇄ 左右反転</button>
    <button class="btn" onclick="loadSample()">🔄 リセット</button>
    <button class="btn" onclick="fitView()">⊡ 全体表示</button>
    <button class="btn" onclick="openLinkModal()">🔗 リンク追加</button>
    <button class="btn btn-y" onclick="exportMiro()">Miro用コピー</button>
  </div>
</div>

<!-- ── ワークスペース ── -->
<div class="workspace">

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="stabs">
      <div class="stab on" onclick="switchTab('cols',this)">列管理</div>
      <div class="stab" onclick="switchTab('nodes',this)">ノード</div>
      <div class="stab" onclick="switchTab('links',this)">リンク</div>
    </div>
    <div class="sbody" id="sbody"></div>
  </div>

  <!-- キャンバス -->
  <div class="cwrap" id="cwrap">
    <svg id="cv"></svg>

    <!-- ハイライト段階インジケーター -->
    <div class="hl-indicator" id="hlInd">
      <span id="hlLabel">直接接続のみ</span>
      <div class="hl-steps">
        <div class="hl-step active" id="hlS1"></div>
        <div class="hl-step" id="hlS2"></div>
        <div class="hl-step" id="hlS3"></div>
      </div>
      <span style="color:var(--text-muted);font-size:10px">クリックで拡大 / 空白で解除</span>
    </div>

    <!-- ズームコントロール -->
    <div class="zc">
      <button class="zb" onclick="zoom(1.2)">＋</button>
      <div class="zlbl" id="zlbl">70%</div>
      <button class="zb" onclick="zoom(0.8)">－</button>
      <button class="zb" onclick="fitView()">⊡</button>
    </div>

    <!-- 凡例 -->
    <div class="leg">
      <div class="leg-ttl">線の強度</div>
      <div class="leg-row"><div class="leg-ln" style="background:var(--ls)"></div>強</div>
      <div class="leg-row"><div class="leg-ln" style="background:var(--lm)"></div>中</div>
      <div class="leg-row"><div class="leg-ln" style="background:var(--lw)"></div>弱</div>
    </div>
  </div>
</div>

<!-- ── リンク追加モーダル ── -->
<div class="mo" id="mLink">
  <div class="md">
    <h3>🔗 リンクを追加</h3>
    <div class="frow"><label class="flbl">起点ノード</label><select class="mi" id="lFrom"></select></div>
    <div class="frow"><label class="flbl">終点ノード</label><select class="mi" id="lTo"></select></div>
    <div class="frow">
      <label class="flbl">強度</label>
      <select class="mi" id="lStr">
        <option value="strong">強（青）</option>
        <option value="mid">中（橙）</option>
        <option value="weak">弱（灰）</option>
      </select>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeLM()">キャンセル</button>
      <button class="btn btn-y" onclick="addLink()">追加</button>
    </div>
  </div>
</div>

<!-- ── ノード追加モーダル ── -->
<div class="mo" id="mNode">
  <div class="md">
    <h3 id="mNT">ノードを追加</h3>
    <div class="frow"><label class="flbl">ノード名</label><input class="mi" type="text" id="nName" placeholder="名前を入力..."></div>
    <div class="frow"><label class="flbl">列</label><select class="mi" id="nCol"></select></div>
    <div class="mfoot">
      <button class="btn" onclick="closeNM()">キャンセル</button>
      <button class="btn btn-y" onclick="confirmNode()">追加</button>
    </div>
  </div>
</div>

<!-- ── スクリプト（sample.js → app.js の順で読み込む）── -->
<script src="data/sample.js"></script>
<script src="js/app.js"></script>
<script src="js/data-loader.js"></script>

</body>
</html>
